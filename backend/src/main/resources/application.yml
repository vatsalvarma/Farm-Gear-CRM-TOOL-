spring:
  application:
    name: farm-gear-connect

  datasource:
    url: jdbc:mysql://localhost:3306/farmgearconnect?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1000}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
        type:
          preferred_uuid_jdbc_type: CHAR

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

  mail:
    host: ${MAIL_HOST:mail.prizmabrixx.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:manojkumar@prizmabrixx.com}
    password: ${MAIL_PASSWORD:Manoj@19}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

  cache:
    type: simple

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:8e8e6a2d3f4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:3600000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:2592000000}
  
  sms:
    enabled: ${SMS_ENABLED:false}
    provider: ${SMS_PROVIDER:TWILIO}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:}
    msg91:
      auth-key: ${MSG91_AUTH_KEY:}
      sender-id: ${MSG91_SENDER_ID:FGCNCT}
  
  calling:
    enabled: ${CALLING_ENABLED:false}
    provider: ${CALLING_PROVIDER:EXOTEL}
    exotel:
      api-key: ${EXOTEL_API_KEY:}
      api-token: ${EXOTEL_API_TOKEN:}
      sid: ${EXOTEL_SID:}
      virtual-number: ${EXOTEL_VIRTUAL_NUMBER:}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      virtual-number: ${TWILIO_VIRTUAL_NUMBER:}
  
  payment:
    enabled: ${PAYMENT_ENABLED:false}
    provider: ${PAYMENT_PROVIDER:RAZORPAY}
    currency: ${PAYMENT_CURRENCY:INR}
    razorpay:
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET:farmgearconnect}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:*,http://localhost:*}

  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  subscription:
    annual-price: ${SUBSCRIPTION_PRICE:2999}
    free-registrations: 30

  otp:
    expiry-minutes: 10

  rate-limit:
    auth-requests-per-minute: 10
    api-requests-per-minute: 100

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  packages-to-scan: com.farmgearconnect.controller

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: false

logging:
  level:
    com.farmgearconnect: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  file:
    name: ${LOG_FILE:logs/farm-gear-connect.log}
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
